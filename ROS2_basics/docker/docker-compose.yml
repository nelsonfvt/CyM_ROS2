services:
  ros2_basics: &ros2_basics
    container_name: ros2_basics
    image: ros2_basics:latest
    ipc: host
    network_mode: host
    privileged: true
    environment:
      - DISPLAY
      - XAUTHORITY=/tmp/.Xauthority
    volumes:
      - $HOME/Data_Files/Repos/CyM_ROS2/ROS2_basics:/root/ros2_ws
      - $HOME/Data_Files/Repos/shared/ros2:/root/shared/ros2
      - $HOME/.Xauthority:/tmp/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
    command: ["tail", "-f", "/dev/null"]

